name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ۱. دانلود کدهای پروژه روی سرور گیت‌هاب
      - name: Checkout code
        uses: actions/checkout@v4

      # ۲. نصب جاوای مورد نیاز برای کامپایل اندروید
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ۳. نصب و راه‌اندازی فلاتر ۳
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # ۴. دانلود پکیج‌ها و وابستگی‌های جدید پروژه
      - name: Install dependencies
        run: flutter pub get

      # ۵. پاک‌سازی کامل کش بومی
      - name: Clean Project Cache
        run: flutter clean

      # ۶. ساخت مجدد لایه اندروید پروژه به صورت کاملاً نو و مدرن
      - name: Recreate Android Folder
        run: flutter create --platforms android .

      # ۷. خروجی نسخه APK کامپایل و ساخت فایل
      - name: Build APK
        run: flutter build apk --release

      # ۸. خروجی تا بتوانید دانلودش کنید
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk